<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Admin Portal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%8D%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #D4B06A;
      --gold-light: #E8C988;
      --gold-dark: #B8924A;
      --gold-glow: rgba(212, 176, 106, 0.15);
      --surface: rgba(255, 253, 248, 0.04);
      --surface-hover: rgba(255, 253, 248, 0.08);
      --border: rgba(255, 253, 248, 0.08);
      --border-focus: rgba(212, 176, 106, 0.5);
      --text: #F0EDE6;
      --text-muted: rgba(240, 237, 230, 0.45);
      --text-ghost: rgba(240, 237, 230, 0.25);
      --danger: #E07070;
      --success: #6EC87A;
      --bg-dark: #08080A;
      --card-bg: rgba(255, 253, 248, 0.03);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: var(--bg-dark);
    }

    .bg-scene::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,176,106,0.07) 0%, transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      animation: orbFloat1 12s ease-in-out infinite;
    }

    .bg-scene::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,58,74,0.06) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: orbFloat2 15s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { top: -200px; transform: translateX(-50%) scale(1); }
      50% { top: -150px; transform: translateX(-50%) scale(1.1); }
    }

    @keyframes orbFloat2 {
      0%, 100% { bottom: -100px; right: -100px; transform: scale(1); }
      50% { bottom: -50px; right: -50px; transform: scale(1.15); }
    }

    /* Floating dust particles */
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-20vh) scale(1); }
    }

    /* ===== AUTH CONTAINER ===== */
    .auth-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    /* ===== BRANDING HEADER ===== */
    .brand {
      text-align: center;
      margin-bottom: 36px;
      animation: brandEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    @keyframes brandEntrance {
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(184,146,74,0.2), rgba(184,146,74,0.05));
      border: 1px solid rgba(212,176,106,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
      backdrop-filter: blur(12px);
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
    }

    /* ===== CARD ===== */
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: cardEntrance 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,176,106,0.3), transparent);
    }

    @keyframes cardEntrance {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== TAB TOGGLE ===== */
    .auth-tabs {
      display: flex;
      background: rgba(255,253,248,0.04);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
    }

    .auth-tab.active {
      background: rgba(212,176,106,0.12);
      color: var(--gold);
      box-shadow: 0 0 12px rgba(212,176,106,0.08);
    }

    .auth-tab:hover:not(.active) {
      color: var(--text);
    }

    /* ===== FORM FIELDS — Icon + Label + Input ===== */
    .field {
      position: relative;
      margin-bottom: 18px;
    }

    .field-label-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .field-icon {
      color: var(--text-ghost);
      transition: color 0.25s;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .field-label-text {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    .field-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,253,248,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      outline: none;
    }

    .field-input:focus {
      border-color: var(--gold);
      background: rgba(212,176,106,0.05);
      box-shadow: 0 0 0 3px rgba(212,176,106,0.1);
    }

    .field-input:focus ~ .field-icon,
    .field-input-wrap:focus-within .field-icon {
      color: var(--gold);
    }

    .field-border-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
      transition: width 0.35s ease;
      pointer-events: none;
    }

    .field-input:focus ~ .field-border-glow { width: 80%; }

    /* ===== PASSWORD TOGGLE ===== */
    .field-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-ghost);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .field-eye:hover { color: var(--text-muted); }
    .field-input-wrap:focus-within .field-eye { color: var(--gold); }

    /* ===== SUBMIT BUTTON ===== */
    .btn-submit {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #B8924A 0%, #D4B06A 50%, #E8C988 100%);
      color: #0a0805;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.25s ease;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(184,146,74,0.35), 0 0 0 1px rgba(212,176,106,0.3);
    }

    .btn-submit:hover::before { opacity: 1; }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0a0805;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-submit.loading .btn-spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: 0; }
    .btn-submit.loading { pointer-events: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ERROR MESSAGE ===== */
    .auth-error {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(224,112,112,0.1);
      border: 1px solid rgba(224,112,112,0.25);
      color: var(--danger);
      font-size: 0.8rem;
      margin-bottom: 16px;
      animation: errorShake 0.4s ease;
    }

    .auth-error.show { display: flex; }

    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* ===== DIVIDER ===== */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .auth-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-divider-text {
      font-size: 0.7rem;
      color: var(--text-ghost);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ===== FORMS ===== */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    /* ===== FOOTER HINT ===== */
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-ghost);
      animation: cardEntrance 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .auth-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .auth-footer a:hover { color: var(--gold-light); }

    /* ===== APP SHELL (dashboard) ===== */
    .app { display: none; }

    .app-header {
      background: rgba(255,253,248,0.03);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }

    .app-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--gold);
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-email {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* Tabs */
    .tabs {
      display: flex;
      overflow-x: auto;
      background: rgba(255,253,248,0.02);
      border-bottom: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      padding: 14px 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      min-height: 44px;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.02em;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      transition: all 0.2s;
    }

    .stat-card:hover {
      border-color: rgba(212,176,106,0.25);
      background: rgba(212,176,106,0.04);
    }

    .stat-card .number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }

    .stat-card .label {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Search bar */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      min-width: 180px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,253,248,0.04);
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: var(--border-focus); }

    .filter-btn {
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-glow);
    }

    /* Data items */
    .data-list { display: flex; flex-direction: column; gap: 10px; }

    .data-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .data-item:hover { border-color: rgba(255,253,248,0.12); }

    .data-item-header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      gap: 12px;
    }

    .data-item-info h3 {
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .data-item-info p {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-attending { background: rgba(110,200,122,0.15); color: var(--success); }
    .badge-declined { background: rgba(224,112,112,0.15); color: var(--danger); }
    .badge-pending { background: rgba(212,176,106,0.15); color: var(--gold); }
    .badge-approved { background: rgba(110,200,122,0.15); color: var(--success); }
    .badge-rejected { background: rgba(224,112,112,0.15); color: var(--danger); }
    .badge-confirmed { background: rgba(110,200,122,0.15); color: var(--success); }

    .chevron {
      color: var(--text-muted);
      transition: transform 0.2s;
      font-size: 1rem;
    }

    .data-item.expanded .chevron { transform: rotate(180deg); }

    .data-item-details {
      display: none;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }

    .data-item.expanded .data-item-details { display: block; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label { font-size: 0.78rem; color: var(--text-muted); }
    .detail-value { font-size: 0.85rem; text-align: right; }

    /* Photos grid */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .photo-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .photo-card:hover { border-color: rgba(212,176,106,0.25); }

    .photo-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      cursor: pointer;
      display: block;
    }

    .photo-info {
      padding: 10px 12px;
    }

    .photo-info h4 {
      font-size: 0.82rem;
      margin-bottom: 2px;
    }

    .photo-info p {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .photo-actions {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      padding-top: 0;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,253,248,0.08);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .lightbox-close:hover {
      background: rgba(255,253,248,0.14);
      border-color: rgba(212,176,106,0.3);
    }

    /* Settings */
    .settings-section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .settings-section h3 {
      font-family: 'Cormorant Garamond', serif;
      color: var(--gold);
      margin-bottom: 16px;
      font-size: 1rem;
      font-weight: 400;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(26,26,30,0.95);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.82rem;
      z-index: 2000;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(110,200,122,0.4); color: var(--success); }
    .toast.error { border-color: rgba(224,112,112,0.4); color: var(--danger); }

    /* Shared button styles */
    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 36px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #B8924A, #D4B06A);
      color: #0a0805;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(184,146,74,0.3);
    }

    .btn-secondary {
      background: rgba(255,253,248,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255,253,248,0.1);
      border-color: rgba(255,253,248,0.15);
    }

    .btn-danger {
      background: rgba(224,112,112,0.15);
      color: var(--danger);
      border: 1px solid rgba(224,112,112,0.2);
    }

    .btn-danger:hover {
      background: rgba(224,112,112,0.25);
    }

    .btn-success {
      background: rgba(110,200,122,0.15);
      color: var(--success);
      border: 1px solid rgba(110,200,122,0.2);
    }

    .btn-success:hover {

    /* Scrollbar */

    /* Responsive */

  </style>
</head>
<body>

<!-- ===== ANIMATED BACKGROUND ===== -->
<div class="bg-scene" id="bgScene"></div>

<!-- ===== AUTH SCREEN ===== -->
<div class="auth-wrapper" id="authScreen">
  <div class="auth-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">💍</div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tab Toggle -->
      <div class="auth-tabs">

      <!-- Error -->
      <div class="auth-error" id="authError">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="authErrorText"></span>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" novalidate>
        <div class="field">
          <div class="field-label-row">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <span class="field-label-text">Email</span>
          </div>
          <div class="field-input-wrap">
            <input type="email" class="field-input" id="loginEmail" autocomplete="email" required>
            <div class="field-border-glow"></div>
          </div>
        </div>
        <div class="field">
          <div class="field-label-row">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <span class="field-label-text">Password</span>
          </div>
          <div class="field-input-wrap">
            <input type="password" class="field-input" id="loginPassword" autocomplete="current-password" required>
            <button type="button" class="field-eye" onclick="togglePassword('loginPassword', this)" aria-label="Toggle password">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
            <div class="field-border-glow"></div>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" novalidate>
        <div class="field">
          <div class="field-label-row">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <span class="field-label-text">Full Name</span>
          </div>
          <div class="field-input-wrap">
            <input type="text" class="field-input" id="registerName" autocomplete="name" required>
            <div class="field-border-glow"></div>
          </div>
        </div>
        <div class="field">
          <div class="field-label-row">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <span class="field-label-text">Email</span>
          </div>
          <div class="field-input-wrap">
            <input type="email" class="field-input" id="registerEmail" autocomplete="email" required>
            <div class="field-border-glow"></div>
          </div>
        </div>
        <div class="field">
          <div class="field-label-row">
            <div class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <span class="field-label-text">Password</span>
          </div>
          <div class="field-input-wrap">
            <input type="password" class="field-input" id="registerPassword" autocomplete="new-password" required minlength="6">
            <button type="button" class="field-eye" onclick="togglePassword('registerPassword', this)" aria-label="Toggle password">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
            <div class="field-border-glow"></div>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner"></span>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      <span id="footerLoginHint">Don't have an account? <a href="#" onclick="event.preventDefault(); tabRegister.click();">Create one</a></span>
      <span id="footerRegisterHint" style="display:none;">Already registered? <a href="#" onclick="event.preventDefault(); tabLogin.click();">Sign in</a></span>
    </div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="app" id="app">
  <header class="app-header">
    <h2>💍 Wedding Admin</h2>
    <div class="user-menu">
      <span class="user-email" id="userEmail"></span>
      <button class="btn btn-secondary btn-small" onclick="app.logout()">Logout</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="rsvps">RSVPs</button>
    <button class="tab" data-tab="photos">Photos</button>
    <button class="tab" data-tab="messages">Messages</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>

  <!-- Dashboard -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="number" id="statTotal">0</div>
        <div class="label">Total RSVPs</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statAttending">0</div>
        <div class="label">Attending</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statDeclined">0</div>
        <div class="label">Declined</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statPhotos">0</div>
        <div class="label">Photos</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statMessages">0</div>
        <div class="label">Messages</div>
      </div>
    </div>
  </div>

  <!-- RSVPs -->
  <div class="tab-content" id="tab-rsvps">
    <div class="search-bar">
      <input type="text" id="rsvpSearch" placeholder="Search RSVPs...">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="attending">Attending</button>
        <button class="filter-btn" data-filter="declined">Declined</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
      </div>
    </div>
    <div class="data-list" id="rsvpList"></div>
  </div>

  <!-- Photos -->
  <div class="tab-content" id="tab-photos">
    <div class="photos-grid" id="photosGrid"></div>
  </div>

  <!-- Messages -->
  <div class="tab-content" id="tab-messages">
    <div class="data-list" id="messagesList"></div>
  </div>

  <!-- Settings -->
  <div class="tab-content" id="tab-settings">
    <div class="settings-section">
      <h3>Profile</h3>
      <div class="field" style="max-width:300px;">
        <input type="text" class="field-input" id="settingsName" placeholder=" " style="background:rgba(255,253,248,0.06);border-color:rgba(255,253,248,0.12);">
        <label class="field-label" for="settingsName">Display Name</label>
        <div class="field-border-glow"></div>
      </div>
      <button class="btn btn-primary btn-small" onclick="app.updateName()">Update Name</button>
    </div>
    <div class="settings-section">
      <h3>Security</h3>
      <div class="field" style="max-width:300px;">
        <input type="password" class="field-input" id="settingsPassword" placeholder=" " style="background:rgba(255,253,248,0.06);border-color:rgba(255,253,248,0.12);" minlength="6">
        <label class="field-label" for="settingsPassword">New Password</label>
        <div class="field-border-glow"></div>
      </div>
      <button class="btn btn-primary btn-small" onclick="app.updatePassword()">Change Password</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="app.closeLightbox()">&times;</button>
  <img id="lightboxImg" src="" alt="Photo">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    updatePassword,
    updateProfile
  } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import {
    getFirestore,
    collection,
    doc,
    getDocs,
    addDoc,
    updateDoc,
    deleteDoc,
    onSnapshot,
    serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCI-zsRP85UVOi0DjtiCwWBwQ1djDy741g",
    authDomain: "it-starts-here-wedding.firebaseapp.com",
    projectId: "it-starts-here-wedding",
    messagingSenderId: "36824586549",
    appId: "1:36824586549:web:711579dbdca5a73ddf147c"
  };

  const app_fb = initializeApp(firebaseConfig);
  const auth = getAuth(app_fb);
  const db = getFirestore(app_fb);

  const ALLOWED_EMAILS = [
    'lakshminamburi@yahoo.com',
    'vnamboori@yahoo.com',
    'sparx.sandeep@gmail.com',
    'chamanthiaki5@gmail.com'
  ];

  const state = {
    rsvps: [],
    photos: [],
    messages: [],
    rsvpFilter: 'all',
    rsvpSearch: ''
  };

  // ===== PARTICLE BACKGROUND =====
  (function spawnParticles() {
    const scene = document.getElementById('bgScene');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      scene.appendChild(p);
    }
  })();

  // ===== PASSWORD TOGGLE =====
  window.togglePassword = function(inputId, btn) {
    const input = document.getElementById(inputId);
    const open = btn.querySelector('.eye-open');
    const closed = btn.querySelector('.eye-closed');
    if (input.type === 'password') {
      input.type = 'text';
      open.style.display = 'none';
      closed.style.display = 'block';
    } else {
      input.type = 'password';
      open.style.display = 'block';
      closed.style.display = 'none';
    }
  };

  // ===== TOAST =====
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = 'toast'; }, 3200);
  }

  // ===== AUTH TAB SWITCHING =====
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const authError = document.getElementById('authError');
  const authErrorText = document.getElementById('authErrorText');

  function showAuthError(msg) {
    authErrorText.textContent = msg;
    authError.classList.add('show');
  }

  function hideAuthError() {
    authError.classList.remove('show');
  }

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    loginForm.classList.add('active');
    registerForm.classList.remove('active');
    hideAuthError();
    document.getElementById('footerLoginHint').style.display = '';
    document.getElementById('footerRegisterHint').style.display = 'none';
  });

  tabRegister.addEventListener('click', () => {
    tabRegister.classList.add('active');
    tabLogin.classList.remove('active');
    registerForm.classList.add('active');
    loginForm.classList.remove('active');
    hideAuthError();
    document.getElementById('footerLoginHint').style.display = 'none';
    document.getElementById('footerRegisterHint').style.display = '';
  });

  // ===== LOGIN =====
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAuthError();
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      loginForm.reset();
    } catch (err) {
      showAuthError(err.message || 'Sign in failed. Please check your credentials.');
    } finally {
      btn.classList.remove('loading');
    }
  });

  // ===== REGISTER =====
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAuthError();
    const btn = document.getElementById('registerBtn');
    btn.classList.add('loading');
    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    if (!ALLOWED_EMAILS.includes(email.toLowerCase())) {
      showAuthError('This email is not authorized to create an account.');
      btn.classList.remove('loading');
      return;
    }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await addDoc(collection(db, 'admins'), {
        email: email.toLowerCase(),
        name,
        role: 'admin',
        createdAt: serverTimestamp()
      });
      registerForm.reset();
    } catch (err) {
      showAuthError(err.message || 'Registration failed. Please try again.');
    } finally {
      btn.classList.remove('loading');
    }
  });

  // ===== AUTH STATE =====
  const authScreen = document.getElementById('authScreen');
  const appShell = document.getElementById('app');

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // Check if email is authorized
      if (!ALLOWED_EMAILS.includes(user.email.toLowerCase())) {
        showAuthError('This account is not authorized to access the admin portal.');
        await signOut(auth);
        authScreen.style.display = 'flex';
        appShell.style.display = 'none';
        return;
      }
      authScreen.style.display = 'none';
      appShell.style.display = 'block';
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('settingsName').value = user.displayName || '';
      app.startRealtime();
    } else {
      authScreen.style.display = 'flex';
      appShell.style.display = 'none';
      app.stopRealtime();
    }
  });

  // ===== TABS =====
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // ===== HELPERS =====
  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderRsvpItem(rsvp) {
    const badgeMap = { attending: 'badge-attending', declined: 'badge-declined', pending: 'badge-pending' };
    const badgeClass = badgeMap[rsvp.attendance] || 'badge-pending';
    return `
      <div class="data-item" data-id="${rsvp.id}">
        <div class="data-item-header" onclick="app.toggleItem('${rsvp.id}')">
          <div class="data-item-info">
            <h3>${rsvp.name || '—'}</h3>
            <p>${rsvp.email || '—'} · ${rsvp.attendance || 'Pending'}</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge ${rsvp.status === 'confirmed' ? 'badge-confirmed' : badgeClass}">${rsvp.attendance || 'Pending'}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="data-item-details">
          <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${rsvp.email || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${rsvp.phone || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Attendance</span><span class="detail-value">${rsvp.attendance || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Dietary</span><span class="detail-value">${rsvp.dietary || 'None specified'}</span></div>
          <div class="detail-row"><span class="detail-label">Plus Ones</span><span class="detail-value">${rsvp.plusOnes || 0}</span></div>
          <div class="detail-row"><span class="detail-label">Message</span><span class="detail-value">${rsvp.message || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${formatDate(rsvp.createdAt)}</span></div>
          <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">
            ${rsvp.status !== 'confirmed' ? `<button class="btn btn-success btn-small" onclick="app.confirmRsvp('${rsvp.id}')">✓ Confirm</button>` : ''}
            <button class="btn btn-danger btn-small" onclick="app.deleteRsvp('${rsvp.id}')">🗑 Delete</button>
          </div>
        </div>
      </div>`;
  }

  function renderPhotoItem(photo) {
    const approved = photo.approved;
    const statusClass = approved === true ? 'badge-approved' : approved === false ? 'badge-rejected' : 'badge-pending';
    const statusText = approved === true ? 'Approved' : approved === false ? 'Rejected' : 'Pending';
    return `
      <div class="photo-card" data-id="${photo.id}">
        <img src="${photo.imageData}" alt="Wedding photo" loading="lazy" onclick="app.openLightbox('${photo.imageData}')">
        <div class="photo-info">
          <h4>${photo.uploaderName || 'Anonymous'}</h4>
          <p>${photo.caption || 'No caption'}</p>
          <p style="margin-top:6px;"><span class="badge ${statusClass}">${statusText}</span></p>
        </div>
        <div class="photo-actions">
          <button class="btn btn-success btn-small" onclick="app.approvePhoto('${photo.id}')" ${approved === true ? 'disabled' : ''}>✓</button>
          <button class="btn btn-danger btn-small" onclick="app.rejectPhoto('${photo.id}')" ${approved === false ? 'disabled' : ''}>✗</button>
        </div>
      </div>`;
  }

  function renderMessageItem(msg) {
    return `
      <div class="data-item" data-id="${msg.id}">
        <div class="data-item-header" onclick="app.toggleItem('${msg.id}')">
          <div class="data-item-info">
            <h3>${msg.name || '—'}</h3>
            <p>${msg.email || '—'}</p>
          </div>
          <span class="chevron">▼</span>
        </div>
        <div class="data-item-details">
          <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${msg.email || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Message</span><span class="detail-value">${msg.message || '—'}</span></div>
          <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${formatDate(msg.createdAt)}</span></div>
          <div style="margin-top:14px;">
            <button class="btn btn-danger btn-small" onclick="app.deleteMessage('${msg.id}')">🗑 Delete</button>
          </div>
        </div>
      </div>`;
  }

  function filterRsvps() {
    const f = state.rsvpFilter;
    const s = state.rsvpSearch.toLowerCase();
    return state.rsvps.filter(r => {
      const matchF = f === 'all' || r.attendance === f;
      const matchS = !s || (r.name && r.name.toLowerCase().includes(s)) || (r.email && r.email.toLowerCase().includes(s));
      return matchF && matchS;
    });
  }

  // ===== APP OBJECT =====
  const app = {
    unsubscribes: [],

    startRealtime() {
      const unsubRsvps = onSnapshot(collection(db, 'rsvps'), snap => {
        state.rsvps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        this.renderRsvps();
        this.updateStats();
      });
      const unsubPhotos = onSnapshot(collection(db, 'photos'), snap => {
        state.photos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        this.renderPhotos();
        this.updateStats();
      });
      const unsubMessages = onSnapshot(collection(db, 'messages'), snap => {
        state.messages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        this.renderMessages();
        this.updateStats();
      });
      this.unsubscribes = [unsubRsvps, unsubPhotos, unsubMessages];
    },

    stopRealtime() {
      this.unsubscribes.forEach(u => u());
      this.unsubscribes = [];
    },

    updateStats() {
      const r = state.rsvps;
      document.getElementById('statTotal').textContent = r.length;
      document.getElementById('statAttending').textContent = r.filter(x => x.attendance === 'attending').length;
      document.getElementById('statDeclined').textContent = r.filter(x => x.attendance === 'declined').length;
      document.getElementById('statPhotos').textContent = state.photos.length;
      document.getElementById('statMessages').textContent = state.messages.length;
    },

    renderRsvps() {
      const list = document.getElementById('rsvpList');
      const filtered = filterRsvps();
      list.innerHTML = filtered.length
        ? filtered.map(r => renderRsvpItem(r)).join('')
        : '<div class="loading">No RSVPs found</div>';
    },

    renderPhotos() {
      const grid = document.getElementById('photosGrid');
      grid.innerHTML = state.photos.length
        ? state.photos.map(p => renderPhotoItem(p)).join('')
        : '<div class="loading">No photos submitted yet</div>';
    },

    renderMessages() {
      const list = document.getElementById('messagesList');
      list.innerHTML = state.messages.length
        ? state.messages.map(m => renderMessageItem(m)).join('')
        : '<div class="loading">No messages yet</div>';
    },

    toggleItem(id) {
      const el = document.querySelector(`.data-item[data-id="${id}"]`);
      if (el) el.classList.toggle('expanded');
    },

    async confirmRsvp(id) {
      try {
        await updateDoc(doc(db, 'rsvps', id), { status: 'confirmed', attendance: 'attending' });
        showToast('RSVP confirmed!');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    async deleteRsvp(id) {
      if (!confirm('Delete this RSVP?')) return;
      try {
        await deleteDoc(doc(db, 'rsvps', id));
        showToast('RSVP deleted');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    async approvePhoto(id) {
      try {
        await updateDoc(doc(db, 'photos', id), { approved: true });
        showToast('Photo approved!');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    async rejectPhoto(id) {
      try {
        await updateDoc(doc(db, 'photos', id), { approved: false });
        showToast('Photo rejected');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    async deleteMessage(id) {
      if (!confirm('Delete this message?')) return;
      try {
        await deleteDoc(doc(db, 'messages', id));
        showToast('Message deleted');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    openLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.add('active');
    },

    closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    },

    async updateName() {
      const name = document.getElementById('settingsName').value.trim();
      if (!name) return showToast('Name cannot be empty', 'error');
      try {
        await updateProfile(auth.currentUser, { displayName: name });
        showToast('Name updated!');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    async updatePassword() {
      const pwd = document.getElementById('settingsPassword').value;
      if (!pwd || pwd.length < 6) return showToast('Password must be at least 6 characters', 'error');
      try {
        await updatePassword(auth.currentUser, pwd);
        document.getElementById('settingsPassword').value = '';
        showToast('Password updated!');
      } catch (err) { showToast('Failed: ' + err.message, 'error'); }
    },

    async logout() {
      await signOut(auth);
    }
  };

  // ===== SEARCH & FILTER =====
  document.getElementById('rsvpSearch').addEventListener('input', e => {
    state.rsvpSearch = e.target.value;
    app.renderRsvps();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.rsvpFilter = btn.dataset.filter;
      app.renderRsvps();
    });
  });

  // ===== LIGHTBOX CLOSE =====
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) app.closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') app.closeLightbox();
  });

  window.app = app;
</script>
</body>
</html>
