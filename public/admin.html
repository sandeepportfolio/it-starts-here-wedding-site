<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #f8f9fa; }
        .navbar { background-color: #1e1e1e !important; border-bottom: 2px solid #D4B06A; }
        .navbar-brand { color: #D4B06A !important; font-weight: bold; }
        .nav-tabs { border-bottom: 1px solid #444; }
        .nav-tabs .nav-link { color: #ccc; border: none; padding: 1rem 1.5rem; }
        .nav-tabs .nav-link.active { background: transparent; color: #D4B06A; border-bottom: 3px solid #D4B06A; font-weight: bold; }
        .nav-tabs .nav-link:hover { color: #D4B06A; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 10px; margin-bottom: 1rem; }
        .stat-card { border-left: 4px solid #D4B06A; }
        .stat-card .display-4 { color: #D4B06A; font-weight: bold; }
        .table { color: #e0e0e0; border-color: #444; }
        .table th { color: #D4B06A; border-bottom: 2px solid #555; }
        .table td { border-color: #333; vertical-align: middle; }
        .table-responsive { overflow-x: auto; }
        .btn-gold { background-color: #D4B06A; color: #000; font-weight: 500; min-height: 44px; }
        .btn-gold:hover { background-color: #b89759; color: #000; }
        .btn-outline-gold { border-color: #D4B06A; color: #D4B06A; min-height: 44px; }
        .btn-outline-gold:hover { background-color: #D4B06A; color: #000; }
        .btn-icon { min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .form-control, .form-select { background: #2c2c2c; border: 1px solid #444; color: #fff; min-height: 44px; }
        .form-control:focus, .form-select:focus { background: #2c2c2c; color: #fff; border-color: #D4B06A; box-shadow: 0 0 0 0.25rem rgba(212, 176, 106, 0.25); }
        .photo-card img { width: 100%; height: 200px; object-fit: cover; border-top-left-radius: 9px; border-top-right-radius: 9px; }
        .text-gold { color: #D4B06A; }
        .loading-spinner { display: inline-block; width: 1.2rem; height: 1.2rem; border: 2px solid #D4B06A; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .event-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin: 1px; background: rgba(212,176,106,0.15); color: #D4B06A; }
        @media (max-width: 768px) {
            .nav-tabs { flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 5px; }
            .nav-tabs .nav-link { white-space: nowrap; padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><i class="bi bi-gem"></i> Admin Portal</a>
        <div class="d-flex align-items-center">
            <a href="../" class="btn btn-sm btn-outline-gold"><i class="bi bi-arrow-left"></i> Back to Site</a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard" type="button">Dashboard</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#rsvps" type="button" onclick="loadRSVPs()">RSVPs</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#photos" type="button" onclick="loadPhotos()">Photos</button></li>
    </ul>

    <div class="tab-content pb-5">

        <!-- DASHBOARD -->
        <div class="tab-pane fade show active" id="dashboard">
            <div class="row g-3" id="stats-container">
                <div class="col-6 col-md-3">
                    <div class="card stat-card p-3 h-100">
                        <h6 class="text-muted text-uppercase mb-1">Total RSVPs</h6>
                        <div class="display-4" id="stat-rsvps"><span class="loading-spinner"></span></div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card stat-card p-3 h-100">
                        <h6 class="text-muted text-uppercase mb-1">Attending</h6>
                        <div class="display-4" id="stat-attending"><span class="loading-spinner"></span></div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card stat-card p-3 h-100">
                        <h6 class="text-muted text-uppercase mb-1">Not Attending</h6>
                        <div class="display-4" id="stat-not-attending"><span class="loading-spinner"></span></div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card stat-card p-3 h-100">
                        <h6 class="text-muted text-uppercase mb-1">Total Photos</h6>
                        <div class="display-4" id="stat-photos"><span class="loading-spinner"></span></div>
                    </div>
                </div>
            </div>

            <!-- Recent RSVPs on dashboard -->
            <h5 class="text-gold mt-4 mb-3">Recent RSVPs</h5>
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover m-0">
                            <thead><tr><th>Name</th><th>Email</th><th>Attending</th><th>Events</th><th>Date</th></tr></thead>
                            <tbody id="recent-rsvp-body">
                                <tr><td colspan="5" class="text-center py-4"><span class="loading-spinner"></span> Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- RSVPS -->
        <div class="tab-pane fade" id="rsvps">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h4 class="text-gold m-0">RSVP List</h4>
                <button class="btn btn-outline-gold" onclick="loadRSVPs()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover m-0">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Contact</th>
                                    <th>Attending</th>
                                    <th>+1s</th>
                                    <th>Events</th>
                                    <th>Message</th>
                                    <th>Source</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="rsvp-body">
                                <tr><td colspan="8" class="text-center py-4"><span class="loading-spinner"></span> Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- PHOTOS -->
        <div class="tab-pane fade" id="photos">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="text-gold m-0">Guest Photos</h4>
                <button class="btn btn-outline-gold" onclick="loadPhotos()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
            </div>
            <div class="row g-4" id="photos-grid">
                <div class="col-12 text-center py-4"><span class="loading-spinner"></span> Loading...</div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, getDocs, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getStorage } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCI-zsRP85UVOi0DjtiCwWBwQ1djDy741g",
      authDomain: "it-starts-here-wedding.firebaseapp.com",
      projectId: "it-starts-here-wedding",
      storageBucket: "it-starts-here-wedding.appspot.com",
      messagingSenderId: "36824586549",
      appId: "1:36824586549:web:711579dbdca5a73ddf147c"
    };

    let db = null;
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
    } catch (e) {
        console.warn('Firebase init failed:', e.message);
    }

    // ---- Helpers ----
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    function formatDate(d) {
        if (!d) return '';
        const date = d.toDate ? d.toDate() : new Date(d);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ---- Load Stats & Recent RSVPs ----
    async function loadDashboard() {
        if (!db) {
            document.getElementById('stat-rsvps').innerText = 'N/A';
            document.getElementById('stat-attending').innerText = 'N/A';
            document.getElementById('stat-not-attending').innerText = 'N/A';
            document.getElementById('stat-photos').innerText = 'N/A';
            return;
        }

        try {
            // Load RSVPs
            const rsvpSnap = await getDocs(collection(db, 'rsvps'));
            const rsvps = [];
            rsvpSnap.forEach(doc => rsvps.push({ id: doc.id, ...doc.data() }));

            const attending = rsvps.filter(r => r.attendance === 'yes' || r.attendance === 'attending').length;
            const notAttending = rsvps.filter(r => r.attendance === 'no' || r.attendance === 'not attending').length;

            document.getElementById('stat-rsvps').innerText = rsvps.length;
            document.getElementById('stat-attending').innerText = attending;
            document.getElementById('stat-not-attending').innerText = notAttending;

            // Show recent 10 RSVPs
            const sorted = rsvps.sort((a, b) => {
                const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0);
                const db2 = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0);
                return db2 - da;
            });
            const recent = sorted.slice(0, 10);
            const tbody = document.getElementById('recent-rsvp-body');
            if (!recent.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No RSVPs yet</td></tr>';
            } else {
                tbody.innerHTML = recent.map(r => `
                    <tr>
                        <td><strong>${escapeHtml(r.name)}</strong></td>
                        <td><small>${escapeHtml(r.email)}</small></td>
                        <td><span class="badge ${r.attendance==='yes'||r.attendance==='attending'?'bg-success':(r.attendance==='no'||r.attendance==='not attending'?'bg-danger':'bg-secondary')}">${escapeHtml(r.attendance)}</span></td>
                        <td>${(r.events || []).map(e => `<span class="event-badge">${escapeHtml(e)}</span>`).join(' ') || '-'}</td>
                        <td><small>${formatDate(r.createdAt)}</small></td>
                    </tr>
                `).join('');
            }

            // Load photos count
            const photoSnap = await getDocs(collection(db, 'photos'));
            document.getElementById('stat-photos').innerText = photoSnap.size;
        } catch (e) {
            console.error('Dashboard error:', e);
            document.getElementById('stat-rsvps').innerText = 'Error';
        }
    }

    // ---- Load RSVPs ----
    window.loadRSVPs = async function() {
        if (!db) return;
        const tbody = document.getElementById('rsvp-body');
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4"><span class="loading-spinner"></span> Loading...</td></tr>';

        try {
            const snap = await getDocs(collection(db, 'rsvps'));
            const rsvps = [];
            snap.forEach(doc => rsvps.push({ id: doc.id, ...doc.data() }));

            rsvps.sort((a, b) => {
                const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0);
                const db2 = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0);
                return db2 - da;
            });

            if (!rsvps.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4">No RSVPs found</td></tr>';
                return;
            }

            tbody.innerHTML = rsvps.map(r => `
                <tr>
                    <td><strong>${escapeHtml(r.name)}</strong>${r.dietary ? `<br><small class="text-muted">Diet: ${escapeHtml(r.dietary)}</small>` : ''}</td>
                    <td><small>${escapeHtml(r.email)}<br>${escapeHtml(r.phone || '')}</small></td>
                    <td><span class="badge ${r.attendance==='yes'||r.attendance==='attending'?'bg-success':(r.attendance==='no'||r.attendance==='not attending'?'bg-danger':'bg-secondary')}">${escapeHtml(r.attendance)}</span></td>
                    <td>${r.plusOnes || 0}</td>
                    <td>${(r.events || []).map(e => `<span class="event-badge">${escapeHtml(e)}</span>`).join(' ') || '-'}</td>
                    <td>${r.message ? `<small class="text-muted">${escapeHtml(r.message.substring(0, 80))}${r.message.length > 80 ? '...' : ''}</small>` : '-'}</td>
                    <td><small class="text-muted">${escapeHtml(r.source || 'main')}</small></td>
                    <td style="white-space:nowrap;"><small>${formatDate(r.createdAt)}</small></td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('RSVP load error:', e);
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-danger">Error loading RSVPs: ${escapeHtml(e.message)}</td></tr>`;
        }
    };

    // ---- Load Photos ----
    window.loadPhotos = async function() {
        if (!db) return;
        const grid = document.getElementById('photos-grid');
        grid.innerHTML = '<div class="col-12 text-center py-4"><span class="loading-spinner"></span> Loading...</div>';

        try {
            const snap = await getDocs(collection(db, 'photos'));
            const photos = [];
            snap.forEach(doc => photos.push({ id: doc.id, ...doc.data() }));

            if (!photos.length) {
                grid.innerHTML = '<div class="col-12 text-center py-4">No photos uploaded yet</div>';
                return;
            }

            grid.innerHTML = photos.map(p => `
                <div class="col-sm-6 col-md-4 col-lg-3">
                    <div class="card photo-card h-100">
                        <img src="${escapeHtml(p.url || p.imageUrl || '')}" alt="Photo" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23333%22 width=%22200%22 height=%22200%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No image</text></svg>'">
                        <div class="card-body p-2">
                            <small class="d-block text-truncate"><strong>By:</strong> ${escapeHtml(p.uploaderName || p.uploader_name || 'Unknown')}</small>
                            ${p.caption ? `<small class="d-block text-muted text-truncate">"${escapeHtml(p.caption)}"</small>` : ''}
                            <small class="d-block text-muted mt-1">${formatDate(p.createdAt || p.uploadedAt)}</small>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error('Photo load error:', e);
            grid.innerHTML = `<div class="col-12 text-center py-4 text-danger">Error loading photos: ${escapeHtml(e.message)}</div>`;
        }
    };

    // Initialize
    loadDashboard();
</script>
</body>
</html>
