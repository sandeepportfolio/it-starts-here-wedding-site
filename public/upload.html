<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Photos - Wedding</title>
    <!-- Use same theme styling as site -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #1a1a1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upload-card { background: #242424; padding: 2rem; border-radius: 1rem; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #D4B06A; margin: 1rem; }
        .form-control { background: #333; border: 1px solid #555; color: #fff; border-radius: 0.5rem; }
        .form-control:focus { background: #333; color: #fff; border-color: #D4B06A; box-shadow: 0 0 0 0.25rem rgba(212, 176, 106, 0.25); }
        .btn-gold { background-color: #D4B06A; color: #1a1a1a; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.5rem; width: 100%; transition: all 0.2s; border: none; }
        .btn-gold:hover { background-color: #b89759; transform: translateY(-2px); }
        .preview-img { max-width: 100%; max-height: 200px; object-fit: cover; border-radius: 0.5rem; display: none; margin-top: 1rem; }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: #D4B06A; font-family: 'Playfair Display', serif; }
        .header p { color: #aaa; }
    </style>
</head>
<body>

    <div class="upload-card">
        <a href="/" class="text-gold text-decoration-none mb-3 d-inline-block" style="color:#D4B06A;">&larr; Back to Wedding Site</a>
        
        <div class="header">
            <h1>Share a Memory</h1>
            <p>Upload photos from the events to our gallery!</p>
        </div>

        <form id="upload-form">

            <div class="mb-4">
                <label class="form-label text-sm text-gray-400">Select Photo</label>
                <input type="file" id="up-file" name="photo" class="form-control py-2" accept="image/png, image/jpeg, image/webp" required>
                <div class="text-center">
                    <img id="preview" class="preview-img mx-auto" alt="Preview">
                </div>
            </div>

            <button type="submit" class="btn btn-gold" id="submit-btn" disabled>Upload Photo</button>
            <div id="upload-msg" class="text-center mt-3 d-none"></div>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('up-file');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submit-btn');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                submitBtn.disabled = false;
            } else {
                preview.src = '';
                preview.style.display = 'none';
                submitBtn.disabled = true;
            }
        });

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const msg = document.getElementById('upload-msg');
            msg.className = 'text-center mt-3 text-info';
            msg.innerText = 'Uploading... Please wait.';
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const res = await fetch('/api/photos', {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    msg.className = 'text-center mt-3 text-success';
                    msg.innerText = 'Upload successful! Waiting for approval.';
                    form.reset();
                    preview.style.display = 'none';
                    setTimeout(() => { msg.innerText = ''; }, 3000);
                } else {
                    const data = await res.json();
                    throw new Error(data.error || 'Upload failed');
                }
            } catch (error) {
                msg.className = 'text-center mt-3 text-danger';
                msg.innerText = error.message;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
